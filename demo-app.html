<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stalbeheer — Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#f0f0f2;color:#111;min-height:100vh;overscroll-behavior:none}
:root{
  --green:#1a5c3a;--green-d:#0f3d27;--green-l:#e8f5ee;
  --amber:#f59e0b;--amber-l:#fef3c7;
  --red:#dc2626;--red-l:#fee2e2;
  --orange:#ea580c;--orange-l:#fff7ed;
  --blue:#2563eb;--blue-l:#eff6ff;
  --gray:#6b7280;--border:#e5e7eb;--bg:#f0f0f2;--card:#fff;
}

.demo-banner{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:var(--amber);color:#78350f;
  padding:9px 16px;font-size:13px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:6px;text-align:center;
}
.demo-banner a{color:#78350f;font-weight:700;text-decoration:underline}

.app-wrap{max-width:480px;margin:0 auto;padding-top:37px;padding-bottom:72px;min-height:100vh}

.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px 0;position:sticky;top:37px;z-index:50}
.app-header-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.app-title{font-size:22px;font-weight:900;letter-spacing:-.03em}
.app-sub{font-size:12px;color:var(--gray);margin-top:2px}
.app-logo{width:36px;height:36px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;letter-spacing:-.04em;flex-shrink:0}

.tabs{display:flex}
.tab{flex:1;padding:10px 0;font-size:14px;font-weight:600;color:var(--gray);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:'Inter',sans-serif}
.tab.active{color:var(--green);border-bottom-color:var(--green)}

.page{display:none}
.page.active{display:block}
.content{padding:14px;display:flex;flex-direction:column;gap:14px}

.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray);margin-bottom:12px}

.alert{border-radius:14px;padding:13px 15px;display:flex;align-items:flex-start;gap:11px;border:1px solid}
.alert.red{background:var(--red-l);border-color:#fca5a5}
.alert.orange{background:var(--orange-l);border-color:#fdba74}
.alert-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.alert-title{font-size:13px;font-weight:700}
.alert-sub{font-size:12px;color:var(--gray);margin-top:2px;line-height:1.4}
.alert.red .alert-title{color:var(--red)}
.alert.orange .alert-title{color:var(--orange)}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-box{background:var(--card);border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-val{font-size:26px;font-weight:900;letter-spacing:-.04em;color:var(--green)}
.stat-lbl{font-size:11px;color:var(--gray);font-weight:500;margin-top:2px}

.task-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s;user-select:none}
.task-item:last-child{border-bottom:none}
.task-item.done{opacity:.55}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s;font-size:11px;color:#fff}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:600}
.task-item.done .task-title{text-decoration:line-through;color:var(--gray)}
.task-meta{font-size:12px;color:var(--gray);margin-top:2px}
.task-note{font-size:12px;color:var(--gray);margin-top:6px;background:var(--bg);padding:6px 8px;border-radius:7px;line-height:1.4}
.type-pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;text-transform:uppercase;letter-spacing:.05em;margin-right:4px}
.pill-voeren{background:#dcfce7;color:#15803d}
.pill-water{background:#dbeafe;color:#1d4ed8}
.pill-controle{background:#f3e8ff;color:#7c3aed}
.pill-wegen{background:#fef3c7;color:#92400e}
.pill-td{background:var(--orange-l);color:#c2410c}

.groep-card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid var(--green)}
.groep-card.med{border-left-color:var(--orange)}
.groep-card.slacht{border-left-color:var(--red)}
.groep-naam{font-size:16px;font-weight:800;letter-spacing:-.02em}
.groep-sub{font-size:12px;color:var(--gray);margin-top:2px}
.groep-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.gs{text-align:center}
.gs-val{font-size:19px;font-weight:800;letter-spacing:-.03em}
.gs-lbl{font-size:10px;color:var(--gray);font-weight:500;margin-top:1px}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px}
.badge.green{background:var(--green-l);color:var(--green)}
.badge.red{background:var(--red-l);color:var(--red)}
.badge.orange{background:var(--orange-l);color:var(--orange)}

.silo-item{padding:12px 0;border-bottom:1px solid var(--border)}
.silo-item:last-child{border-bottom:none}
.silo-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.silo-naam{font-size:14px;font-weight:700}
.silo-kg{font-size:12px;color:var(--gray)}
.silo-track{height:8px;background:var(--border);border-radius:99px;overflow:hidden}
.silo-fill{height:100%;border-radius:99px}
.silo-fill.ok{background:var(--green)}
.silo-fill.warn{background:var(--amber)}
.silo-fill.crit{background:var(--red)}
.silo-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-top:4px}

.voer-card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.voer-head{font-size:15px;font-weight:800;letter-spacing:-.02em;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.voer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.vg-lbl{font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.vg-val{font-size:15px;font-weight:700;margin-top:2px}
.voer-divider{border:none;border-top:1px solid var(--border);margin:14px 0}

.slacht-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.slacht-item:last-child{border-bottom:none}
.slacht-days{width:44px;height:44px;border-radius:12px;background:var(--green-l);color:var(--green);font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.slacht-days.urgent{background:var(--red-l);color:var(--red)}
.slacht-name{font-size:14px;font-weight:600}
.slacht-meta{font-size:12px;color:var(--gray);margin-top:1px}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);height:72px;z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--gray);font-size:11px;font-weight:500;font-family:'Inter',sans-serif;position:relative;transition:color .15s;padding:0}
.nav-btn.active{color:var(--green)}
.nav-icon-wrap{font-size:22px;line-height:1;transition:transform .15s}
.nav-btn.active .nav-icon-wrap{transform:scale(1.1)}
.nav-badge{position:absolute;top:8px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 3px}

.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(8px);background:#111;color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:99px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.link-btn{font-size:13px;font-weight:600;color:var(--green);background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;padding:0}
</style>
</head>
<body>

<div class="demo-banner">
  🎯 Demo met voorbeelddata &nbsp;·&nbsp; <a href="contact.html">Vraag uw eigen account aan →</a>
</div>

<div class="app-wrap">

  <!-- DASHBOARD -->
  <div id="page-dashboard" class="page active">
    <div class="app-header">
      <div class="app-header-row">
        <div><div class="app-title">Dashboard</div><div class="app-sub">Demo Varkenshouderij BV · ma 14 april 2026</div></div>
        <div class="app-logo">S</div>
      </div>
    </div>
    <div class="content" id="dash-content"></div>
  </div>

  <!-- TAKEN -->
  <div id="page-taken" class="page">
    <div class="app-header">
      <div class="app-header-row" style="margin-bottom:4px">
        <div><div class="app-title">Taken</div><div class="app-sub">Maandag 14 april 2026</div></div>
      </div>
      <div class="tabs">
        <button class="tab active" id="tab-vandaag" onclick="setTaakTab('vandaag')">Vandaag</button>
        <button class="tab" id="tab-komend" onclick="setTaakTab('komend')">Komend</button>
      </div>
    </div>
    <div class="content" id="taken-content"></div>
  </div>

  <!-- GROEPEN -->
  <div id="page-groepen" class="page">
    <div class="app-header">
      <div class="app-header-row">
        <div><div class="app-title">Groepen</div><div class="app-sub">3 actieve rondes · 555 dieren</div></div>
      </div>
    </div>
    <div class="content" id="groepen-content"></div>
  </div>

  <!-- VOERPLANNING -->
  <div id="page-voer" class="page">
    <div class="app-header">
      <div class="app-header-row">
        <div><div class="app-title">Voerplanning</div><div class="app-sub">Actueel schema · silo-koppeling</div></div>
      </div>
    </div>
    <div class="content" id="voer-content"></div>
  </div>

  <!-- NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="navTo('dashboard')">
      <div class="nav-icon-wrap">🏠</div><span>Dashboard</span>
    </button>
    <button class="nav-btn" id="nav-taken" onclick="navTo('taken')">
      <div class="nav-icon-wrap">✅</div>
      <div id="taken-badge" class="nav-badge" style="display:none"></div>
      <span>Taken</span>
    </button>
    <button class="nav-btn" id="nav-groepen" onclick="navTo('groepen')">
      <div class="nav-icon-wrap">🐷</div><span>Groepen</span>
    </button>
    <button class="nav-btn" id="nav-voer" onclick="navTo('voer')">
      <div class="nav-icon-wrap">🌾</div><span>Voerplanning</span>
    </button>
  </nav>
</div>

<div id="toast" class="toast"></div>

<script>
'use strict';

const GROEPEN = [
  {id:'g1',naam:'Ronde 1-2026',afd:'Afd 1 & 2',leverancier:'Van den Berg',
   inkoop:'2026-01-05',aantal:280,sterfte:5,gewicht:112,slacht:'2026-04-28',
   week:15,voer:'Afmest 2',kgDier:2.9},
  {id:'g2',naam:'Ronde 3-2025',afd:'Afd 3',leverancier:'Hendriksen Biggen',
   inkoop:'2026-02-16',aantal:145,sterfte:2,gewicht:67,slacht:'2026-06-08',
   week:9,voer:'Groei 2',kgDier:2.1,medicatie:'Draxxin · vrijgave 27 mei'},
  {id:'g3',naam:'Ronde 4-2025',afd:'Afd 4',leverancier:'Van den Berg',
   inkoop:'2026-03-23',aantal:138,sterfte:1,gewicht:36,slacht:'2026-07-28',
   week:4,voer:'Opfok B',kgDier:0.9}
];

const SILOS = [
  {naam:'Silo 1-2',cap:15000,huidig:8450,afd:'Afd 1 & 2',verbruik:812,bijgewerkt:'13 april'},
  {naam:'Silo 3',cap:12000,huidig:1680,afd:'Afd 3 & 4',verbruik:410,bijgewerkt:'12 april'}
];

let TAKEN = [
  {id:'t1',type:'voeren',icon:'🌾',label:'Voeren',afd:'Alle afdelingen',persoon:'Jan',dag:'vandaag',gereed:true},
  {id:'t2',type:'water',icon:'💧',label:'Water',afd:'Afd 4',persoon:'Kees',dag:'vandaag',gereed:true},
  {id:'t3',type:'controle',icon:'👁',label:'Controle',afd:'Afd 1 & 2',persoon:'Jan',dag:'vandaag',gereed:false,notitie:'Slacht over 14 dagen — gewichten controleren'},
  {id:'t4',type:'wegen',icon:'⚖️',label:'Wegen',afd:'Afd 3',persoon:'Kees',dag:'vandaag',gereed:false},
  {id:'t5',type:'td',icon:'🔧',label:'Monteur',afd:'Afd 2',persoon:'Monteur',dag:'morgen',gereed:false,notitie:'Drinkbakje defect · unit 12'}
];

const TODAY = '2026-04-14';

function dagenTot(d){return Math.round((new Date(d)-new Date(TODAY))/86400000);}

/* NAV */
let currentPage='dashboard';
function navTo(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  currentPage=p;
  if(p==='dashboard')renderDashboard();
  if(p==='taken')renderTaken(taakTab);
  if(p==='groepen')renderGroepen();
  if(p==='voer')renderVoer();
}

/* TOAST */
let toastT;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2000);
}

/* BADGE */
function updateBadge(){
  const n=TAKEN.filter(t=>t.dag==='vandaag'&&!t.gereed).length;
  const b=document.getElementById('taken-badge');
  b.style.display=n?'flex':'none';if(n)b.textContent=n;
}

/* DASHBOARD */
function renderDashboard(){
  const silo=SILOS[1];
  const dagen=Math.floor(silo.huidig/silo.verbruik);
  const open=TAKEN.filter(t=>t.dag==='vandaag'&&!t.gereed).length;
  const totaal=GROEPEN.reduce((s,g)=>s+g.aantal-g.sterfte,0);
  const slachtLijst=[...GROEPEN].map(g=>({...g,d:dagenTot(g.slacht)})).sort((a,b)=>a.d-b.d);

  document.getElementById('dash-content').innerHTML=`
    <div class="alert red">
      <div class="alert-icon">🚨</div>
      <div>
        <div class="alert-title">Silo 3 bijna leeg — ${dagen} dagen</div>
        <div class="alert-sub">${silo.huidig.toLocaleString('nl')} kg resterend · ~${silo.verbruik} kg/dag · ${silo.afd}</div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-val">${totaal}</div><div class="stat-lbl">Levende dieren</div></div>
      <div class="stat-box"><div class="stat-val">${GROEPEN.length}</div><div class="stat-lbl">Actieve rondes</div></div>
      <div class="stat-box"><div class="stat-val">${open}</div><div class="stat-lbl">Taken open</div></div>
    </div>
    <div class="card">
      <div class="card-title">Taken vandaag</div>
      ${TAKEN.filter(t=>t.dag==='vandaag').map(t=>`
        <div class="task-item ${t.gereed?'done':''}" style="cursor:default">
          <div class="task-check ${t.gereed?'done':''}">${t.gereed?'✓':''}</div>
          <div class="task-icon">${t.icon}</div>
          <div class="task-body">
            <div class="task-title">${t.label} — ${t.afd}</div>
            <div class="task-meta">${t.persoon}</div>
          </div>
        </div>`).join('')}
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);text-align:center">
        <button class="link-btn" onclick="navTo('taken')">Bekijk alle taken →</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Slachtagenda</div>
      ${slachtLijst.map(g=>`
        <div class="slacht-item">
          <div class="slacht-days ${g.d<=21?'urgent':''}">${g.d}d</div>
          <div>
            <div class="slacht-name">${g.naam} · ${g.afd}</div>
            <div class="slacht-meta">${g.slacht} · ${g.aantal-g.sterfte} stuks · ~${g.gewicht} kg</div>
          </div>
        </div>`).join('')}
    </div>`;
}

/* TAKEN */
let taakTab='vandaag';
function setTaakTab(tab){
  taakTab=tab;
  document.getElementById('tab-vandaag').classList.toggle('active',tab==='vandaag');
  document.getElementById('tab-komend').classList.toggle('active',tab==='komend');
  renderTaken(tab);
}
function toggleTaak(id){
  const t=TAKEN.find(t=>t.id===id);if(!t)return;
  t.gereed=!t.gereed;
  showToast(t.gereed?'✓ Taak afgerond':'Taak heropend');
  updateBadge();renderTaken(taakTab);
  if(currentPage==='dashboard')renderDashboard();
}
const pillCls={voeren:'pill-voeren',water:'pill-water',controle:'pill-controle',wegen:'pill-wegen',td:'pill-td'};
function renderTaken(tab){
  const lijst=TAKEN.filter(t=>t.dag===tab);
  document.getElementById('taken-content').innerHTML=lijst.length===0
    ?`<div style="text-align:center;padding:40px 0;color:var(--gray);font-size:14px">Geen taken</div>`
    :`<div class="card">${lijst.map(t=>`
      <div class="task-item ${t.gereed?'done':''}" onclick="toggleTaak('${t.id}')">
        <div class="task-check ${t.gereed?'done':''}">${t.gereed?'✓':''}</div>
        <div class="task-icon">${t.icon}</div>
        <div class="task-body">
          <div class="task-title"><span class="type-pill ${pillCls[t.type]||''}">${t.label}</span>${t.afd}</div>
          <div class="task-meta">${t.persoon}</div>
          ${t.notitie?`<div class="task-note">📌 ${t.notitie}</div>`:''}
        </div>
      </div>`).join('')}</div>
      ${tab==='vandaag'?`<p style="text-align:center;font-size:12px;color:var(--gray)">Tik op een taak om af te vinken</p>`:''}`;
}

/* GROEPEN */
function renderGroepen(){
  document.getElementById('groepen-content').innerHTML=GROEPEN.map(g=>{
    const levend=g.aantal-g.sterfte;
    const uitval=((g.sterfte/g.aantal)*100).toFixed(1);
    const d=dagenTot(g.slacht);
    return `<div class="groep-card ${g.medicatie?'med':d<=21?'slacht':''}">
      <div class="groep-naam">${g.naam}</div>
      <div class="groep-sub">${g.afd} · ${g.leverancier}</div>
      <div class="groep-stats">
        <div class="gs"><div class="gs-val">W${g.week}</div><div class="gs-lbl">Week</div></div>
        <div class="gs"><div class="gs-val">${levend}</div><div class="gs-lbl">Levend</div></div>
        <div class="gs"><div class="gs-val">${g.gewicht}</div><div class="gs-lbl">kg gem.</div></div>
        <div class="gs"><div class="gs-val">${uitval}%</div><div class="gs-lbl">Uitval</div></div>
      </div>
      <div class="badges">
        <span class="badge ${d<=21?'red':'green'}">🔪 Slacht ${d} dagen · ${g.slacht}</span>
        ${g.medicatie?`<span class="badge orange">⚠️ ${g.medicatie}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

/* VOERPLANNING */
function renderVoer(){
  const siloHTML=SILOS.map(s=>{
    const pct=Math.round(s.huidig/s.cap*100);
    const d=Math.floor(s.huidig/s.verbruik);
    const cls=d<=3?'crit':d<=7?'warn':'ok';
    const statusTxt=cls==='crit'?`🚨 Kritiek — ${d} dagen`:cls==='warn'?`⚠️ Let op — ${d} dagen`:`✓ ${d} dagen`;
    return `<div class="silo-item">
      <div class="silo-top"><div class="silo-naam">${s.naam}</div><div class="silo-kg">${s.huidig.toLocaleString('nl')} / ${s.cap.toLocaleString('nl')} kg</div></div>
      <div class="silo-track"><div class="silo-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="silo-meta"><span>${s.afd}</span><span style="font-weight:700;color:${cls==='crit'?'var(--red)':cls==='warn'?'var(--orange)':'var(--green)'}">${statusTxt}</span></div>
    </div>`;
  }).join('');

  const voerHTML=GROEPEN.map(g=>{
    const levend=g.aantal-g.sterfte;
    const totaal=Math.round(g.kgDier*levend);
    return `<div class="voer-card">
      <div class="voer-head"><span>${g.afd}</span><span style="font-size:13px;color:var(--gray);font-weight:600">${g.naam}</span></div>
      <div class="voer-grid">
        <div><div class="vg-lbl">Voerschema</div><div class="vg-val">${g.voer}</div></div>
        <div><div class="vg-lbl">Week</div><div class="vg-val">Week ${g.week}</div></div>
        <div><div class="vg-lbl">Kg / dier / dag</div><div class="vg-val">${g.kgDier} kg</div></div>
        <div><div class="vg-lbl">Levend</div><div class="vg-val">${levend} stuks</div></div>
      </div>
      <hr class="voer-divider">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span style="font-size:13px;color:var(--gray);font-weight:600">Totaal per dag</span>
        <span style="font-size:22px;font-weight:900;letter-spacing:-.03em;color:var(--green)">${totaal} kg</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('voer-content').innerHTML=`
    <div class="card"><div class="card-title">Silo-voorraad</div>${siloHTML}</div>
    ${voerHTML}`;
}

/* INIT */
updateBadge();
renderDashboard();
</script>
